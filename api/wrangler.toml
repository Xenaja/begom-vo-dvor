name = "begom-api"
main = "src/index.js"
compatibility_date = "2026-01-01"

# База D1 (database_id подставим после `wrangler d1 create begom`)
[[d1_databases]]
binding = "DB"
database_name = "begom"
database_id = "5c8692ce-acac-4a76-ba50-276bd7abe661"

# Резерв места без оплаты держим столько минут (истёкшие — освобождаются)
[vars]
HOLD_MINUTES = "15"
SITE_URL = "https://xenaja.github.io/begom-vo-dvor"
API_URL = "https://begom-api.xenonline77.workers.dev"
TAXATION = "usn_income"   # режим налогообложения для чека (уточнить у заказчика)
# Секреты (НЕ здесь): TBANK_TERMINAL, TBANK_PASSWORD — через `wrangler secret put`

# Ежедневная генерация занятий из шаблонов (03:00 UTC = 06:00 МСК)
[triggers]
crons = ["0 3 * * *"]
