<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>–С–µ–≥–Њ–Љ –≤–Њ –і–≤–Њ—А вАФ –∞–і–Љ–Є–љ–Ї–∞</title>
<style>
  :root{--green:#7CB342;--dark:#2F3A22;--bd:#E4E2D8;--bg:#F6FAEE;--muted:#6B675E}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;color:#2B2A26;background:#fff;font-size:15px}
  header{background:var(--dark);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  header b{font-size:17px}
  header button{background:#52613a;color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .tabs button{background:var(--bg);border:1px solid var(--bd);border-radius:999px;padding:9px 18px;cursor:pointer;font-weight:700;font-size:14px}
  .tabs button.active{background:var(--green);border-color:var(--green);color:#fff}
  h2{font-size:19px;margin:22px 0 10px}
  table{width:100%;border-collapse:collapse;margin-bottom:8px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #EFEDE5;font-size:14px;vertical-align:top}
  th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  .card{border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:16px;background:#fff}
  .sess-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .sess-head .t{font-weight:800}
  .badge{display:inline-block;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:700}
  .b-paid{background:#E6F2D6;color:#3f6d18}.b-hold{background:#FFF3D6;color:#8A6314}
  .b-attended{background:#D6EBF2;color:#1d5a6e}.b-no_show{background:#F2Dede;color:#9a3b3b}
  .b-trial{background:#FFF3D6;color:#8A6314}
  input,select{font:inherit;font-size:14px;border:1.5px solid var(--bd);border-radius:8px;padding:7px 9px;outline:none}
  input:focus,select:focus{border-color:var(--green)}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
  .row label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
  .btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:14px}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.gray{background:#8a8f80}.btn.red{background:#b85c5c}.btn.blue{background:#3f87a6}
  .muted{color:var(--muted)} .right{text-align:right}
  #login{max-width:340px;margin:80px auto;text-align:center}
  #login input{width:100%;margin:12px 0;text-align:center}
  .hidden{display:none}
  .hint{font-size:13px;color:var(--muted);margin:4px 0 12px}
  /* –Љ–Њ–і–∞–ї–Ї–Є */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-ov.hidden{display:none}
  .modal-box{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
  .modal-box h3{margin:0 0 14px;font-size:18px}
  .modal-box p{margin:0 0 8px;font-size:15px}
  .frow{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .frow label{font-size:12px;color:var(--muted)}
  .frow input,.frow select{width:100%}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  .btn.big{padding:11px 18px;font-size:15px}
  .day-h{font-weight:800;margin:16px 0 6px;font-size:14px;text-transform:capitalize;color:var(--dark)}
</style>
</head>
<body>

<div id="login">
  <h2>–Р–і–Љ–Є–љ–Ї–∞ ¬Ђ–С–µ–≥–Њ–Љ –≤–Њ –і–≤–Њ—А¬ї</h2>
  <input id="pw" type="password" placeholder="–Я–∞—А–Њ–ї—М" autocomplete="current-password">
  <button class="btn" id="loginBtn" style="width:100%">–Т–Њ–є—В–Є</button>
  <div id="loginErr" class="muted" style="margin-top:10px;color:#b85c5c"></div>
</div>

<div id="app" class="hidden">
  <header>
    <b>–С–µ–≥–Њ–Љ –≤–Њ –і–≤–Њ—А ¬Ј –∞–і–Љ–Є–љ–Ї–∞</b>
    <button id="logout">–Т—Л–є—В–Є</button>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button data-tab="schedule" class="active">–†–∞—Б–њ–Є—Б–∞–љ–Є–µ</button>
      <button data-tab="instructors">–Ш–љ—Б—В—А—Г–Ї—В–Њ—А—Л</button>
    </div>
    <div id="view"></div>
  </div>
</div>

<div id="modal" class="modal-ov hidden"><div class="modal-box" id="modal-box"></div></div>

<script>
var API='https://begom-api.xenonline77.workers.dev';
var KEY=localStorage.getItem('bvd_admin_key')||'';
var DATA=null, TAB='schedule';

var WD=['', '–Я–љ','–Т—В','–°—А','–І—В','–Я—В','–°–±','–Т—Б'];
var fmtDT=new Intl.DateTimeFormat('ru-RU',{timeZone:'Europe/Moscow',weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
var fmtT=new Intl.DateTimeFormat('ru-RU',{timeZone:'Europe/Moscow',hour:'2-digit',minute:'2-digit'});
var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})};
var rub=function(k){return (k/100)+' вВљ'};

function api(path,method,body){
  return fetch(API+path,{method:method||'GET',headers:{'content-type':'application/json','x-admin-key':KEY},
    body:body?JSON.stringify(body):undefined}).then(function(r){
    if(r.status===401){logout();throw new Error('unauth');}
    return r.json();
  });
}
function load(){return api('/api/admin/data').then(function(d){DATA=d;render();});}
function save(table,row){return api('/api/admin/upsert','POST',{table:table,row:row}).then(load);}
function setBooking(id,status){return api('/api/admin/booking','POST',{id:id,status:status}).then(load);}
function del(table,id){return api('/api/admin/delete','POST',{table:table,id:id}).then(function(r){
  if(r&&r.error==='has_bookings'){alert('–Э–µ–ї—М–Ј—П —Г–і–∞–ї–Є—В—М: –љ–∞ –±—Г–і—Г—Й–Є—Е –Ј–∞–љ—П—В–Є—П—Е –µ—Б—В—М –Ј–∞–њ–Є—Б–Є. –°–љ–∞—З–∞–ї–∞ –Њ—В–Љ–µ–љ–Є—В–µ —Н—В–Є –Ј–∞–љ—П—В–Є—П (–Ї–ї–Є–µ–љ—В—Л –њ–Њ–ї—Г—З–∞—В —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ).');}
  return load();});}
function cancelSession(id){return api('/api/admin/cancel-session','POST',{id:id}).then(function(r){
  if(r&&r.ok){alert(r.notified>0?('–Ч–∞–љ—П—В–Є–µ –Њ—В–Љ–µ–љ–µ–љ–Њ. –£–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ –Њ '+r.notified+' –Ј–∞–њ–Є—Б–∞–≤—И. –Њ—В–њ—А–∞–≤–ї–µ–љ–Њ –≤ —З–∞—В –Ј–∞—П–≤–Њ–Ї.'):'–Ч–∞–љ—П—В–Є–µ –Њ—В–Љ–µ–љ–µ–љ–Њ.');}
  return load();});}

// ---- –Љ–Њ–і–∞–ї–Ї–Є ----
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal').classList.remove('hidden');}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});

function confirmModal(text,okLabel,okClass,onOk){
  openModal('<h3>–Я–Њ–і—В–≤–µ—А–ґ–і–µ–љ–Є–µ</h3><p>'+esc(text)+'</p><div class="modal-actions">'
    +'<button class="btn gray big" id="m-no">–Ю—В–Љ–µ–љ–∞</button>'
    +'<button class="btn '+(okClass||'red')+' big" id="m-yes">'+esc(okLabel)+'</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-yes').onclick=function(){closeModal();onOk();};
}
function ageOpts(sel){return '<option'+(sel==='5-6'?' selected':'')+'>5-6</option><option'+(sel==='7-9'?' selected':'')+'>7-9</option>';}

function editTemplateModal(t){
  var loc=DATA.locations.find(function(l){return l.id===t.location_id});
  openModal('<h3>–†–µ–і–∞–Ї—В–Є—А–Њ–≤–∞—В—М –Ј–∞–љ—П—В–Є–µ (—А–µ–≥—Г–ї—П—А–љ–Њ–µ)</h3>'
    +'<div class="frow"><label>–Ф–≤–Њ—А (–љ–µ –Љ–µ–љ—П–µ—В—Б—П)</label><input value="'+esc(loc?loc.title:'')+'" disabled></div>'
    +'<div class="frow"><label>–Ф–µ–љ—М –љ–µ–і–µ–ї–Є</label><select id="e-wd">'+[1,2,3,4,5,6,7].map(function(d){return '<option value="'+d+'"'+(d===t.weekday?' selected':'')+'>'+WD[d]+'</option>';}).join('')+'</select></div>'
    +'<div class="frow"><label>–Т—А–µ–Љ—П (–Ь–°–Ъ)</label><input id="e-time" value="'+esc(t.time_msk)+'" placeholder="10:00"></div>'
    +'<div class="frow"><label>–У—А—Г–њ–њ–∞</label><select id="e-age">'+ageOpts(t.age_group)+'</select></div>'
    +'<div class="frow"><label>–Ь–µ—Б—В</label><input id="e-cap" type="number" value="'+t.capacity+'"></div>'
    +'<div class="frow"><label>–¶–µ–љ–∞, вВљ</label><input id="e-price" type="number" value="'+(t.price_kopecks/100)+'"></div>'
    +'<div class="frow"><label>–Ш–љ—Б—В—А—Г–Ї—В–Њ—А</label><select id="e-inst">'+instOptions(t.instructor_id)+'</select></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">–Ю—В–Љ–µ–љ–∞</button><button class="btn big" id="m-save">–°–Њ—Е—А–∞–љ–Є—В—М –Є–Ј–Љ–µ–љ–µ–љ–Є—П</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-save').onclick=function(){
    var row={id:t.id,weekday:+val('e-wd'),time_msk:val('e-time'),age_group:val('e-age'),capacity:+val('e-cap'),price_kopecks:Math.round(+val('e-price')*100),instructor_id:val('e-inst')?+val('e-inst'):null};
    closeModal(); save('session_templates',row);
  };
}
function editSessionModal(s){
  var msk=new Date(new Date(s.starts_at).getTime()+3*3600e3);
  var dstr=msk.toISOString().slice(0,10), tstr=msk.toISOString().slice(11,16);
  openModal('<h3>–†–µ–і–∞–Ї—В–Є—А–Њ–≤–∞—В—М –Ј–∞–љ—П—В–Є–µ (—А–∞–Ј–Њ–≤–Њ–µ)</h3>'
    +'<div class="frow"><label>–Ф–≤–Њ—А (–љ–µ –Љ–µ–љ—П–µ—В—Б—П)</label><input value="'+esc(s.loc_title)+'" disabled></div>'
    +'<div class="frow"><label>–Ф–∞—В–∞</label><input id="e-date" type="date" value="'+dstr+'"></div>'
    +'<div class="frow"><label>–Т—А–µ–Љ—П (–Ь–°–Ъ)</label><input id="e-time" value="'+tstr+'"></div>'
    +'<div class="frow"><label>–У—А—Г–њ–њ–∞</label><select id="e-age">'+ageOpts(s.age_group)+'</select></div>'
    +'<div class="frow"><label>–Ь–µ—Б—В</label><input id="e-cap" type="number" value="'+s.capacity+'"></div>'
    +'<div class="frow"><label>–¶–µ–љ–∞, вВљ</label><input id="e-price" type="number" value="'+(s.price_kopecks/100)+'"></div>'
    +'<div class="frow"><label>–Ґ–Є–њ</label><select id="e-kind"><option value="trial"'+(s.kind==='trial'?' selected':'')+'>–њ—А–Њ–±–љ–Њ–µ</option><option value="regular"'+(s.kind==='regular'?' selected':'')+'>—А–∞–Ј–Њ–≤–Њ–µ</option></select></div>'
    +'<div class="frow"><label>–Ш–љ—Б—В—А—Г–Ї—В–Њ—А</label><select id="e-inst">'+instOptions(s.instructor_id)+'</select></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">–Ю—В–Љ–µ–љ–∞</button><button class="btn big" id="m-save">–°–Њ—Е—А–∞–љ–Є—В—М –Є–Ј–Љ–µ–љ–µ–љ–Є—П</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-save').onclick=function(){
    var row={id:s.id,starts_at:mskToUtc(val('e-date'),val('e-time')),age_group:val('e-age'),capacity:+val('e-cap'),price_kopecks:Math.round(+val('e-price')*100),kind:val('e-kind'),instructor_id:val('e-inst')?+val('e-inst'):null};
    closeModal(); save('sessions',row);
  };
}

// ---- –ї–Њ–≥–Є–љ ----
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');}
function logout(){localStorage.removeItem('bvd_admin_key');location.reload();}
document.getElementById('logout').onclick=logout;
document.getElementById('loginBtn').onclick=function(){
  KEY=document.getElementById('pw').value.trim();
  localStorage.setItem('bvd_admin_key',KEY);
  api('/api/admin/data').then(function(d){DATA=d;showApp();render();})
    .catch(function(){document.getElementById('loginErr').textContent='–Э–µ–≤–µ—А–љ—Л–є –њ–∞—А–Њ–ї—М';});
};
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginBtn').click();});

document.querySelectorAll('.tabs button').forEach(function(b){
  b.onclick=function(){TAB=b.getAttribute('data-tab');
    document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');render();};
});

// ---- —А–µ–љ–і–µ—А ----
function render(){
  if(!DATA)return;
  var v=document.getElementById('view');
  if(TAB==='bookings')v.innerHTML=renderBookings();
  else if(TAB==='schedule')v.innerHTML=renderSchedule();
  else v.innerHTML=renderInstructors();
  bindActions();
}

function locName(id){var l=DATA.locations.find(function(x){return x.id===id});return l?l.title:'вАФ';}
function instOptions(sel){
  var o='<option value="">вАФ –Є–љ—Б—В—А—Г–Ї—В–Њ—А вАФ</option>';
  DATA.instructors.filter(function(i){return i.active}).forEach(function(i){
    o+='<option value="'+i.id+'"'+(sel===i.id?' selected':'')+'>'+esc(i.name)+'</option>';});
  return o;
}

function renderBookings(){
  var byS={}; DATA.bookings.forEach(function(b){(byS[b.session_id]=byS[b.session_id]||[]).push(b);});
  var sess=DATA.sessions.filter(function(s){return s.status!=='cancelled'});
  var html='<h2>–Ч–∞–њ–Є—Б–Є –љ–∞ –±–ї–Є–ґ–∞–є—И–Є–µ –Ј–∞–љ—П—В–Є—П</h2><div class="hint">–Я–Њ–Ї–∞–Ј–∞–љ—Л –Ј–∞–љ—П—В–Є—П —Б —Б–µ–≥–Њ–і–љ—П—И–љ–µ–≥–Њ –і–љ—П. вЬУ –њ—А–Є—И—С–ї / вЬЧ –љ–µ –њ—А–Є—И—С–ї / –Њ—В–Љ–µ–љ–Є—В—М.</div>';
  var any=false;
  sess.forEach(function(s){
    var bk=byS[s.id]||[];
    var active=bk.filter(function(b){return b.status!=='cancelled'});
    if(!active.length)return;
    any=true;
    var occ=active.filter(function(b){return b.status==='paid'||b.status==='attended'||b.status==='hold'}).length;
    html+='<div class="card"><div class="sess-head"><span class="t">'+fmtDT.format(new Date(s.starts_at))
      +' ¬Ј '+esc(s.loc_title)+' ¬Ј '+esc(s.age_group)+' –ї–µ—В'
      +(s.kind==='trial'?' <span class="badge b-trial">–њ—А–Њ–±–љ–Њ–µ</span>':'')+'</span>'
      +'<span class="muted">'+occ+'/'+s.capacity+' –Љ–µ—Б—В</span></div>';
    html+='<table><tr><th>–†–µ–±—С–љ–Њ–Ї</th><th>–†–Њ–і–Є—В–µ–ї—М</th><th>–Ґ–µ–ї–µ—Д–Њ–љ</th><th>–Ю–њ–ї–∞—В–∞</th><th>–°—В–∞—В—Г—Б</th><th></th></tr>';
    active.forEach(function(b){
      html+='<tr><td>'+esc(b.child_name)+(b.child_age?(', '+b.child_age):'')+'</td><td>'+esc(b.parent_name)+'</td>'
        +'<td>'+esc(b.phone)+'</td><td>'+(b.amount_kopecks>0?rub(b.amount_kopecks):'–±–µ—Б–њ–ї.')+'</td>'
        +'<td><span class="badge b-'+b.status+'">'+statusRu(b.status)+'</span></td>'
        +'<td class="right">'
        +'<button class="btn sm blue" data-bk="'+b.id+'" data-st="attended">вЬУ</button> '
        +'<button class="btn sm gray" data-bk="'+b.id+'" data-st="no_show">вЬЧ</button> '
        +'<button class="btn sm red" data-bk="'+b.id+'" data-st="cancelled">√Ч</button></td></tr>';
    });
    html+='</table></div>';
  });
  if(!any)html+='<p class="muted">–Р–Ї—В–Є–≤–љ—Л—Е –Ј–∞–њ–Є—Б–µ–є –њ–Њ–Ї–∞ –љ–µ—В.</p>';
  return html;
}
function statusRu(s){return {paid:'–Њ–њ–ї–∞—З–µ–љ–Њ',hold:'—А–µ–Ј–µ—А–≤',attended:'–њ—А–Є—И—С–ї',no_show:'–љ–µ –њ—А–Є—И—С–ї',cancelled:'–Њ—В–Љ–µ–љ—С–љ'}[s]||s;}

function renderSchedule(){
  var html='<h2>–Ы–Њ–Ї–∞—Ж–Є–Є</h2><table><tr><th>–Э–∞–Ј–≤–∞–љ–Є–µ</th><th>–Ґ–Є–њ</th><th>–Ф–Њ—Б—В—Г–њ</th><th>–Я–Њ–Ї—А—Л—В–Є–µ</th><th>–Р–Ї—В–Є–≤–љ–∞</th></tr>';
  DATA.locations.forEach(function(l){
    html+='<tr><td>'+esc(l.title)+'</td><td>'+esc(l.yard_type)+'</td><td>'+esc(l.access_note)+'</td><td>'+esc(l.surface)+'</td>'
      +'<td><button class="btn sm '+(l.active?'':'gray')+'" data-loc-toggle="'+l.id+'" data-active="'+(l.active?0:1)+'">'+(l.active?'–і–∞':'–љ–µ—В')+'</button></td></tr>';
  });
  html+='</table>'
    +'<div class="card"><b>–Ф–Њ–±–∞–≤–Є—В—М –ї–Њ–Ї–∞—Ж–Є—О</b><div class="row">'
    +'<input id="loc-title" placeholder="–Ц–Ъ / –і–≤–Њ—А"><input id="loc-yard" placeholder="—В–Є–њ (–Њ—В–Ї—А—Л—В—Л–є/–Ј–∞–Ї—А—Л—В—Л–є)">'
    +'<input id="loc-access" placeholder="–і–Њ—Б—В—Г–њ"><input id="loc-surface" placeholder="–њ–Њ–Ї—А—Л—В–Є–µ">'
    +'<button class="btn" id="loc-add">–Ф–Њ–±–∞–≤–Є—В—М</button></div></div>';

  html+='<h2>–†–µ–≥—Г–ї—П—А–љ–Њ–µ —А–∞—Б–њ–Є—Б–∞–љ–Є–µ (—И–∞–±–ї–Њ–љ—Л)</h2><div class="hint">–Ш–Ј —И–∞–±–ї–Њ–љ–Њ–≤ —Б–Њ–Ј–і–∞—О—В—Б—П –Ј–∞–љ—П—В–Є—П –љ–∞ 4 –љ–µ–і–µ–ї–Є –≤–њ–µ—А—С–і. –†–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є–µ –њ–µ—А–µ—Б–Њ–Ј–і–∞—С—В –±—Г–і—Г—Й–Є–µ –Ј–∞–љ—П—В–Є—П (–Ї—А–Њ–Љ–µ —В–µ—Е, –≥–і–µ —Г–ґ–µ –µ—Б—В—М –Ј–∞–њ–Є—Б–Є).</div>';

// —З–Є—В–∞–µ—В –Ї–∞—А—В–Є–љ–Ї—Г, —Б–ґ–Є–Љ–∞–µ—В –і–Њ maxSize –њ–Њ –±–Њ–ї—М—И–µ–є —Б—В–Њ—А–Њ–љ–µ, –Њ—В–і–∞—С—В JPEG data-URL
function fileToDataUrl(file,maxSize,cb){
  if(!file){cb(null);return;}
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height,m=Math.max(w,h);
      if(m>maxSize){var k=maxSize/m;w=Math.round(w*k);h=Math.round(h*k);}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror=function(){cb(null)};
    img.src=r.result;
  };
  r.readAsDataURL(file);
}
