<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Бегом во двор — админка</title>
<style>
  :root{--green:#7CB342;--dark:#2F3A22;--bd:#E4E2D8;--bg:#F6FAEE;--muted:#6B675E}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;color:#2B2A26;background:#fff;font-size:15px}
  header{background:var(--dark);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  header b{font-size:17px}
  header button{background:#52613a;color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer}
  .wrap{max-width:1100px;margin:0 auto;padding:18px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .tabs button{background:var(--bg);border:1px solid var(--bd);border-radius:999px;padding:9px 18px;cursor:pointer;font-weight:700;font-size:14px}
  .tabs button.active{background:var(--green);border-color:var(--green);color:#fff}
  h2{font-size:19px;margin:22px 0 10px}
  table{width:100%;border-collapse:collapse;margin-bottom:8px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #EFEDE5;font-size:14px;vertical-align:top}
  th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
  .card{border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:16px;background:#fff}
  .sess-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
  .sess-head .t{font-weight:800}
  .badge{display:inline-block;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:700}
  .b-paid{background:#E6F2D6;color:#3f6d18}.b-hold{background:#FFF3D6;color:#8A6314}
  .b-attended{background:#D6EBF2;color:#1d5a6e}.b-no_show{background:#F2Dede;color:#9a3b3b}
  .b-trial{background:#FFF3D6;color:#8A6314}
  input,select{font:inherit;font-size:14px;border:1.5px solid var(--bd);border-radius:8px;padding:7px 9px;outline:none}
  input:focus,select:focus{border-color:var(--green)}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
  .row label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
  .btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:14px}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.gray{background:#8a8f80}.btn.red{background:#b85c5c}.btn.blue{background:#3f87a6}
  .muted{color:var(--muted)} .right{text-align:right}
  #login{max-width:340px;margin:80px auto;text-align:center}
  #login input{width:100%;margin:12px 0;text-align:center}
  .hidden{display:none}
  .hint{font-size:13px;color:var(--muted);margin:4px 0 12px}
  /* модалки */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-ov.hidden{display:none}
  .modal-box{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow:auto}
  .modal-box h3{margin:0 0 14px;font-size:18px}
  .modal-box p{margin:0 0 8px;font-size:15px}
  .frow{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .frow label{font-size:12px;color:var(--muted)}
  .frow input,.frow select{width:100%}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  .btn.big{padding:11px 18px;font-size:15px}
  .day-h{font-weight:800;margin:16px 0 6px;font-size:14px;text-transform:capitalize;color:var(--dark)}
</style>
</head>
<body>

<div id="login">
  <h2>Админка «Бегом во двор»</h2>
  <input id="pw" type="password" placeholder="Пароль" autocomplete="current-password">
  <button class="btn" id="loginBtn" style="width:100%">Войти</button>
  <div id="loginErr" class="muted" style="margin-top:10px;color:#b85c5c"></div>
  <a href="#" id="forgot" style="display:inline-block;margin-top:14px;color:#5E8C24;font-size:14px">Забыли пароль?</a>
</div>

<div id="app" class="hidden">
  <header>
    <b>Бегом во двор · админка</b>
    <div style="display:flex;gap:8px"><button id="chgpw">Пароль</button><button id="logout">Выйти</button></div>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button data-tab="schedule" class="active">Расписание</button>
      <button data-tab="instructors">Инструкторы</button>
    </div>
    <div id="view"></div>
  </div>
</div>

<div id="modal" class="modal-ov hidden"><div class="modal-box" id="modal-box"></div></div>

<script>
var API='https://begom-api.xenonline77.workers.dev';
var KEY=localStorage.getItem('bvd_admin_key')||'';
var DATA=null, TAB='schedule';

var WD=['', 'Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
var fmtDT=new Intl.DateTimeFormat('ru-RU',{timeZone:'Europe/Moscow',weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
var fmtT=new Intl.DateTimeFormat('ru-RU',{timeZone:'Europe/Moscow',hour:'2-digit',minute:'2-digit'});
var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})};
var rub=function(k){return (k/100)+' ₽'};

function api(path,method,body){
  return fetch(API+path,{method:method||'GET',headers:{'content-type':'application/json','x-admin-key':KEY},
    body:body?JSON.stringify(body):undefined}).then(function(r){
    if(r.status===401){logout();throw new Error('unauth');}
    return r.json();
  });
}
function load(){return api('/api/admin/data').then(function(d){DATA=d;render();});}
function save(table,row){return api('/api/admin/upsert','POST',{table:table,row:row}).then(load);}
function setBooking(id,status){return api('/api/admin/booking','POST',{id:id,status:status}).then(load);}
function del(table,id){return api('/api/admin/delete','POST',{table:table,id:id}).then(function(r){
  if(r&&r.error==='has_bookings'){alert('Нельзя удалить: на будущих занятиях есть записи. Сначала отмените эти занятия (клиенты получат уведомление).');}
  return load();});}
function cancelSession(id){return api('/api/admin/cancel-session','POST',{id:id}).then(function(r){
  if(r&&r.ok){alert(r.notified>0?('Занятие отменено. Уведомление о '+r.notified+' записавш. отправлено в чат заявок.'):'Занятие отменено.');}
  return load();});}

// ---- модалки ----
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal').classList.remove('hidden');}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal();});

function confirmModal(text,okLabel,okClass,onOk){
  openModal('<h3>Подтверждение</h3><p>'+esc(text)+'</p><div class="modal-actions">'
    +'<button class="btn gray big" id="m-no">Отмена</button>'
    +'<button class="btn '+(okClass||'red')+' big" id="m-yes">'+esc(okLabel)+'</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-yes').onclick=function(){closeModal();onOk();};
}
function ageOpts(sel){return '<option'+(sel==='5-6'?' selected':'')+'>5-6</option><option'+(sel==='7-9'?' selected':'')+'>7-9</option>';}

function editTemplateModal(t){
  var loc=DATA.locations.find(function(l){return l.id===t.location_id});
  openModal('<h3>Редактировать занятие (регулярное)</h3>'
    +'<div class="frow"><label>Двор (не меняется)</label><input value="'+esc(loc?loc.title:'')+'" disabled></div>'
    +'<div class="frow"><label>День недели</label><select id="e-wd">'+[1,2,3,4,5,6,7].map(function(d){return '<option value="'+d+'"'+(d===t.weekday?' selected':'')+'>'+WD[d]+'</option>';}).join('')+'</select></div>'
    +'<div class="frow"><label>Время (МСК)</label><input id="e-time" value="'+esc(t.time_msk)+'" placeholder="10:00"></div>'
    +'<div class="frow"><label>Группа</label><select id="e-age">'+ageOpts(t.age_group)+'</select></div>'
    +'<div class="frow"><label>Мест</label><input id="e-cap" type="number" value="'+t.capacity+'"></div>'
    +'<div class="frow"><label>Цена, ₽</label><input id="e-price" type="number" value="'+(t.price_kopecks/100)+'"></div>'
    +'<div class="frow"><label>Инструктор</label><select id="e-inst">'+instOptions(t.instructor_id)+'</select></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">Отмена</button><button class="btn big" id="m-save">Сохранить изменения</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-save').onclick=function(){
    var row={id:t.id,weekday:+val('e-wd'),time_msk:val('e-time'),age_group:val('e-age'),capacity:+val('e-cap'),price_kopecks:Math.round(+val('e-price')*100),instructor_id:val('e-inst')?+val('e-inst'):null};
    closeModal(); save('session_templates',row);
  };
}
function editSessionModal(s){
  var msk=new Date(new Date(s.starts_at).getTime()+3*3600e3);
  var dstr=msk.toISOString().slice(0,10), tstr=msk.toISOString().slice(11,16);
  openModal('<h3>Редактировать занятие (эта дата)</h3>'
    +'<div class="frow"><label>Двор (не меняется)</label><input value="'+esc(s.loc_title)+'" disabled></div>'
    +'<div class="frow"><label>Дата</label><input id="e-date" type="date" value="'+dstr+'"></div>'
    +'<div class="frow"><label>Время (МСК)</label><input id="e-time" value="'+tstr+'"></div>'
    +'<div class="frow"><label>Группа</label><select id="e-age">'+ageOpts(s.age_group)+'</select></div>'
    +'<div class="frow"><label>Мест</label><input id="e-cap" type="number" value="'+s.capacity+'"></div>'
    +'<div class="frow"><label>Цена, ₽</label><input id="e-price" type="number" value="'+(s.price_kopecks/100)+'"></div>'
    +'<div class="frow"><label>Тип</label><select id="e-kind"><option value="trial"'+(s.kind==='trial'?' selected':'')+'>пробное</option><option value="regular"'+(s.kind==='regular'?' selected':'')+'>разовое</option></select></div>'
    +'<div class="frow"><label>Инструктор</label><select id="e-inst">'+instOptions(s.instructor_id)+'</select></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">Отмена</button><button class="btn big" id="m-save">Сохранить изменения</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-save').onclick=function(){
    var row={id:s.id,starts_at:mskToUtc(val('e-date'),val('e-time')),age_group:val('e-age'),capacity:+val('e-cap'),price_kopecks:Math.round(+val('e-price')*100),kind:val('e-kind'),instructor_id:val('e-inst')?+val('e-inst'):null};
    closeModal(); save('sessions',row);
  };
}

// ---- логин ----
function showApp(){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');}
function logout(){localStorage.removeItem('bvd_admin_key');location.reload();}
document.getElementById('logout').onclick=logout;
document.getElementById('loginBtn').onclick=function(){
  KEY=document.getElementById('pw').value.trim();
  localStorage.setItem('bvd_admin_key',KEY);
  api('/api/admin/data').then(function(d){DATA=d;showApp();render();})
    .catch(function(){document.getElementById('loginErr').textContent='Неверный пароль';});
};
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginBtn').click();});

// ---- смена / восстановление пароля ----
document.getElementById('chgpw').onclick=function(){changePwModal();};
document.getElementById('forgot').onclick=function(e){e.preventDefault();resetModal();};
function changePwModal(){
  openModal('<h3>Смена пароля</h3>'
    +'<div class="frow"><label>Новый пароль (мин. 6 символов)</label><input id="np1" type="password"></div>'
    +'<div class="frow"><label>Повторите новый пароль</label><input id="np2" type="password"></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">Отмена</button><button class="btn big" id="m-save">Сохранить</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('m-save').onclick=function(){
    var a=val('np1'),b=val('np2');
    if(a.length<6){alert('Пароль слишком короткий (мин. 6 символов).');return;}
    if(a!==b){alert('Пароли не совпадают.');return;}
    api('/api/admin/password','POST',{next:a}).then(function(r){
      if(r&&r.ok){KEY=a;localStorage.setItem('bvd_admin_key',KEY);closeModal();alert('Пароль изменён и сохранён на этом устройстве.');}
      else alert('Не удалось сменить пароль.');});
  };
}
function resetReq(){return fetch(API+'/api/admin/reset-request',{method:'POST'}).then(function(r){return r.json();});}
function resetConf(code,next){return fetch(API+'/api/admin/reset-confirm',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code:code,next:next})}).then(function(r){return r.json();});}
function resetModal(){
  openModal('<h3>Восстановление пароля</h3>'
    +'<p class="muted" style="font-size:13px">Нажмите «Отправить код» — он придёт в Telegram-чат заявок. Затем введите код и новый пароль.</p>'
    +'<div style="margin:10px 0"><button class="btn big" id="r-send">Отправить код в Telegram</button></div>'
    +'<hr style="border:none;border-top:1px solid #eee;margin:14px 0">'
    +'<div class="frow"><label>Код из Telegram</label><input id="r-code" inputmode="numeric" autocomplete="one-time-code"></div>'
    +'<div class="frow"><label>Новый пароль (мин. 6)</label><input id="r-np" type="password"></div>'
    +'<div class="modal-actions"><button class="btn gray big" id="m-no">Закрыть</button><button class="btn big" id="r-confirm">Сменить пароль</button></div>');
  document.getElementById('m-no').onclick=closeModal;
  document.getElementById('r-send').onclick=function(){
    resetReq().then(function(){alert('Если Telegram подключён — код отправлен в чат заявок. Проверьте сообщения.');});};
  document.getElementById('r-confirm').onclick=function(){
    var c=val('r-code'),n=val('r-np');
    if(!c){alert('Введите код.');return;}
    if(n.length<6){alert('Пароль слишком короткий (мин. 6 символов).');return;}
    resetConf(c,n).then(function(r){
      if(r&&r.ok){KEY=n;localStorage.setItem('bvd_admin_key',KEY);closeModal();alert('Пароль изменён. Входим…');api('/api/admin/data').then(function(d){DATA=d;showApp();render();});}
      else alert(r&&r.error==='bad_code'?'Неверный код.':(r&&r.error==='expired'?'Код истёк — запросите новый.':(r&&r.error==='no_request'?'Сначала отправьте код.':'Не удалось сменить пароль.')));});
  };
}

document.querySelectorAll('.tabs button').forEach(function(b){
  b.onclick=function(){TAB=b.getAttribute('data-tab');
    document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('active')});
    b.classList.add('active');render();};
});

// ---- рендер ----
function render(){
  if(!DATA)return;
  var v=document.getElementById('view');
  if(TAB==='bookings')v.innerHTML=renderBookings();
  else if(TAB==='schedule')v.innerHTML=renderSchedule();
  else v.innerHTML=renderInstructors();
  bindActions();
}

function locName(id){var l=DATA.locations.find(function(x){return x.id===id});return l?l.title:'—';}
function instOptions(sel){
  var o='<option value="">— инструктор —</option>';
  DATA.instructors.filter(function(i){return i.active}).forEach(function(i){
    o+='<option value="'+i.id+'"'+(sel===i.id?' selected':'')+'>'+esc(i.name)+'</option>';});
  return o;
}

function renderBookings(){
  var byS={}; DATA.bookings.forEach(function(b){(byS[b.session_id]=byS[b.session_id]||[]).push(b);});
  var sess=DATA.sessions.filter(function(s){return s.status!=='cancelled'});
  var html='<h2>Записи на ближайшие занятия</h2><div class="hint">Показаны занятия с сегодняшнего дня. ✓ пришёл / ✗ не пришёл / отменить.</div>';
  var any=false;
  sess.forEach(function(s){
    var bk=byS[s.id]||[];
    var active=bk.filter(function(b){return b.status!=='cancelled'});
    if(!active.length)return;
    any=true;
    var occ=active.filter(function(b){return b.status==='paid'||b.status==='attended'||b.status==='hold'}).length;
    html+='<div class="card"><div class="sess-head"><span class="t">'+fmtDT.format(new Date(s.starts_at))
      +' · '+esc(s.loc_title)+' · '+esc(s.age_group)+' лет'
      +(s.kind==='trial'?' <span class="badge b-trial">пробное</span>':'')+'</span>'
      +'<span class="muted">'+occ+'/'+s.capacity+' мест</span></div>';
    html+='<table><tr><th>Ребёнок</th><th>Родитель</th><th>Телефон</th><th>Оплата</th><th>Статус</th><th></th></tr>';
    active.forEach(function(b){
      html+='<tr><td>'+esc(b.child_name)+(b.child_age?(', '+b.child_age):'')+'</td><td>'+esc(b.parent_name)+'</td>'
        +'<td>'+esc(b.phone)+'</td><td>'+(b.amount_kopecks>0?rub(b.amount_kopecks):'беспл.')+'</td>'
        +'<td><span class="badge b-'+b.status+'">'+statusRu(b.status)+'</span></td>'
        +'<td class="right">'
        +'<button class="btn sm blue" data-bk="'+b.id+'" data-st="attended">✓</button> '
        +'<button class="btn sm gray" data-bk="'+b.id+'" data-st="no_show">✗</button> '
        +'<button class="btn sm red" data-bk="'+b.id+'" data-st="cancelled">×</button></td></tr>';
    });
    html+='</table></div>';
  });
  if(!any)html+='<p class="muted">Активных записей пока нет.</p>';
  return html;
}
function statusRu(s){return {paid:'оплачено',hold:'резерв',attended:'пришёл',no_show:'не пришёл',cancelled:'отменён'}[s]||s;}

function renderSchedule(){
  var html='<h2>Локации</h2><table><tr><th>Название</th><th>Тип</th><th>Доступ</th><th>Покрытие</th><th>Активна</th></tr>';
  DATA.locations.forEach(function(l){
    html+='<tr><td>'+esc(l.title)+'</td><td>'+esc(l.yard_type)+'</td><td>'+esc(l.access_note)+'</td><td>'+esc(l.surface)+'</td>'
      +'<td><button class="btn sm '+(l.active?'':'gray')+'" data-loc-toggle="'+l.id+'" data-active="'+(l.active?0:1)+'">'+(l.active?'да':'нет')+'</button></td></tr>';
  });
  html+='</table>'
    +'<div class="card"><b>Добавить локацию</b><div class="row">'
    +'<input id="loc-title" placeholder="ЖК / двор"><input id="loc-yard" placeholder="тип (открытый/закрытый)">'
    +'<input id="loc-access" placeholder="доступ"><input id="loc-surface" placeholder="покрытие">'
    +'<button class="btn" id="loc-add">Добавить</button></div></div>';

  html+='<h2>Регулярное расписание (шаблоны)</h2><div class="hint">Из шаблонов создаются занятия на 4 недели вперёд. Редактирование пересоздаёт будущие занятия (кроме тех, где уже есть записи).</div>';
  html+='<table><tr><th>Двор</th><th>День</th><th>Время</th><th>Группа</th><th>Мест</th><th>Цена</th><th>Инструктор</th><th></th></tr>';
  DATA.templates.forEach(function(t){
    var inst=DATA.instructors.find(function(i){return i.id===t.instructor_id});
    html+='<tr><td>'+esc(locName(t.location_id))+'</td><td>'+WD[t.weekday]+'</td><td>'+esc(t.time_msk)+'</td>'
      +'<td>'+esc(t.age_group)+'</td><td>'+t.capacity+'</td><td>'+rub(t.price_kopecks)+'</td>'
      +'<td>'+(inst?esc(inst.name):'<span class="muted">—</span>')+'</td>'
      +'<td class="right"><button class="btn sm blue" data-tpl-edit="'+t.id+'">✏️ Ред.</button> '
      +'<button class="btn sm red" data-tpl-del="'+t.id+'">🗑</button></td></tr>';
  });
  html+='</table>'
    +'<div class="card"><b>Добавить шаблон</b><div class="row">'
    +'<label>Двор<select id="tpl-loc">'+DATA.locations.map(function(l){return '<option value="'+l.id+'">'+esc(l.title)+'</option>'}).join('')+'</select></label>'
    +'<label>День<select id="tpl-wd"><option value="1">Пн</option><option value="2">Вт</option><option value="3">Ср</option><option value="4">Чт</option><option value="5">Пт</option><option value="6">Сб</option><option value="7">Вс</option></select></label>'
    +'<label>Время<input id="tpl-time" placeholder="10:00" size="5"></label>'
    +'<label>Группа<select id="tpl-age"><option>5-6</option><option>7-9</option></select></label>'
    +'<label>Мест<input id="tpl-cap" type="number" value="8" size="3"></label>'
    +'<label>Цена ₽<input id="tpl-price" type="number" value="350" size="4"></label>'
    +'<button class="btn" id="tpl-add">Добавить</button></div></div>';

  // ближайшие занятия (конкретные даты)
  var dayKey=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Moscow',year:'numeric',month:'2-digit',day:'2-digit'});
  var fmtDay=new Intl.DateTimeFormat('ru-RU',{timeZone:'Europe/Moscow',weekday:'long',day:'numeric',month:'long'});
  html+='<h2>Ближайшие занятия</h2><div class="hint">Отмена — на конкретную дату (погода / мало записей). Записавшимся уйдёт уведомление в чат заявок. Разовые можно ещё редактировать и удалять.</div>';
  var bkCount={};
  DATA.bookings.forEach(function(b){ if(['paid','attended','hold'].indexOf(b.status)>=0) bkCount[b.session_id]=(bkCount[b.session_id]||0)+1; });
  var groups={};
  DATA.sessions.filter(function(s){return s.status==='open'}).forEach(function(s){var k=dayKey.format(new Date(s.starts_at));(groups[k]=groups[k]||[]).push(s);});
  var keys=Object.keys(groups).sort();
  if(!keys.length) html+='<p class="muted">Занятий нет.</p>';
  keys.forEach(function(k){
    var arr=groups[k].sort(function(a,b){return a.starts_at<b.starts_at?-1:1});
    html+='<div class="day-h">'+fmtDay.format(new Date(arr[0].starts_at))+'</div>';
    html+='<table><tr><th>Время</th><th>Двор</th><th>Группа</th><th>Тип</th><th>Места</th><th>Записей</th><th></th></tr>';
    arr.forEach(function(s){
      var occ=bkCount[s.id]||0, free=s.capacity-occ;
      var typ=s.kind==='trial'?'пробное':(s.template_id?'регулярное':'разовое');
      var acts='<button class="btn sm blue" data-ss-edit="'+s.id+'">✏️</button> '
        +'<button class="btn sm gray" data-ss-cancel="'+s.id+'">⛔ Отменить</button> '
        +'<button class="btn sm red" data-ss-del="'+s.id+'">🗑</button>';
      html+='<tr><td>'+fmtT.format(new Date(s.starts_at))+'</td><td>'+esc(s.loc_title)+'</td><td>'+esc(s.age_group)+'</td>'
        +'<td>'+typ+'</td><td>'+free+'/'+s.capacity+'</td><td>'+occ+'</td>'
        +'<td class="right">'+acts+'</td></tr>';
    });
    html+='</table>';
  });

  html+='<div class="card"><b>Добавить разовое занятие</b><div class="row">'
    +'<label>Двор<select id="ss-loc">'+DATA.locations.map(function(l){return '<option value="'+l.id+'">'+esc(l.title)+'</option>'}).join('')+'</select></label>'
    +'<label>Дата<input id="ss-date" type="date"></label>'
    +'<label>Время<input id="ss-time" placeholder="10:00" size="5"></label>'
    +'<label>Группа<select id="ss-age"><option>5-6</option><option>7-9</option></select></label>'
    +'<label>Мест<input id="ss-cap" type="number" value="12" size="3"></label>'
    +'<label>Цена ₽<input id="ss-price" type="number" value="0" size="4"></label>'
    +'<label>Тип<select id="ss-kind"><option value="trial">пробное</option><option value="regular">разовое</option></select></label>'
    +'<button class="btn" id="ss-add">Добавить</button></div></div>';
  return html;
}

function renderInstructors(){
  var html='<h2>Инструкторы</h2><div class="hint">«Убрать» — скрывает инструктора (история сохраняется). Фото квадратное, сжимается до 400px автоматически.</div>';
  html+='<table><tr><th>Фото</th><th>Имя</th><th>Опыт (строка)</th><th>Активен</th><th></th></tr>';
  DATA.instructors.forEach(function(i){
    var thumb=i.photo_url?'<img src="'+esc(i.photo_url)+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover">':'<span class="muted">нет</span>';
    html+='<tr><td>'+thumb+'<br><label class="muted" style="font-size:11px;cursor:pointer;text-decoration:underline">изменить<input type="file" accept="image/*" data-inst-photo="'+i.id+'" style="display:none"></label></td>'
      +'<td>'+esc(i.name)+'</td><td>'+esc(i.experience)+'</td>'
      +'<td><span class="badge '+(i.active?'b-paid':'b-no_show')+'">'+(i.active?'да':'нет')+'</span></td>'
      +'<td class="right"><button class="btn sm '+(i.active?'red':'')+'" data-inst-toggle="'+i.id+'" data-active="'+(i.active?0:1)+'">'+(i.active?'убрать':'вернуть')+'</button></td></tr>';
  });
  html+='</table>'
    +'<div class="card"><b>Добавить инструктора</b><div class="row">'
    +'<input id="inst-name" placeholder="Имя"><input id="inst-exp" placeholder="опыт одной строкой" size="36">'
    +'<label class="muted">Фото<input id="inst-photo" type="file" accept="image/*"></label>'
    +'<button class="btn" id="inst-add">Добавить</button></div></div>';
  return html;
}

// читает картинку, сжимает до maxSize по большей стороне, отдаёт JPEG data-URL
function fileToDataUrl(file,maxSize,cb){
  if(!file){cb(null);return;}
  var r=new FileReader();
  r.onload=function(){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height,m=Math.max(w,h);
      if(m>maxSize){var k=maxSize/m;w=Math.round(w*k);h=Math.round(h*k);}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror=function(){cb(null)};
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

function mskToUtc(date,time){return new Date(date+'T'+(time||'00:00')+':00+03:00').toISOString();}

function bindActions(){
  // записи
  document.querySelectorAll('[data-bk]').forEach(function(b){b.onclick=function(){setBooking(+b.getAttribute('data-bk'),b.getAttribute('data-st'));};});
  // локации
  var la=document.getElementById('loc-add'); if(la)la.onclick=function(){
    var t=val('loc-title'); if(!t)return; save('locations',{title:t,yard_type:val('loc-yard'),access_note:val('loc-access'),surface:val('loc-surface'),active:1});};
  document.querySelectorAll('[data-loc-toggle]').forEach(function(b){b.onclick=function(){save('locations',{id:+b.getAttribute('data-loc-toggle'),active:+b.getAttribute('data-active')});};});
  // шаблоны
  var ta=document.getElementById('tpl-add'); if(ta)ta.onclick=function(){
    var tm=val('tpl-time'); if(!tm){alert('Укажите время');return;}
    save('session_templates',{location_id:+val('tpl-loc'),weekday:+val('tpl-wd'),time_msk:tm,age_group:val('tpl-age'),capacity:+val('tpl-cap'),price_kopecks:Math.round(+val('tpl-price')*100),valid_from:new Date().toISOString().slice(0,10),active:1});};
  document.querySelectorAll('[data-tpl-edit]').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-tpl-edit');editTemplateModal(DATA.templates.find(function(t){return t.id===id}));};});
  document.querySelectorAll('[data-tpl-del]').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-tpl-del');confirmModal('Вы действительно хотите удалить этот слот?','Да, удалить','red',function(){del('session_templates',id);});};});
  // разовые занятия — добавление
  var sa=document.getElementById('ss-add'); if(sa)sa.onclick=function(){
    var d=val('ss-date'),t=val('ss-time'); if(!d||!t){alert('Укажите дату и время');return;}
    save('sessions',{location_id:+val('ss-loc'),starts_at:mskToUtc(d,t),age_group:val('ss-age'),capacity:+val('ss-cap'),price_kopecks:Math.round(+val('ss-price')*100),kind:val('ss-kind'),status:'open'});};
  // ближайшие занятия — ред./отмена/удаление
  document.querySelectorAll('[data-ss-edit]').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-ss-edit');editSessionModal(DATA.sessions.find(function(s){return s.id===id}));};});
  document.querySelectorAll('[data-ss-cancel]').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-ss-cancel');confirmModal('Вы действительно хотите отменить это занятие? Записавшимся уйдёт уведомление в чат.','Да, отменить','red',function(){cancelSession(id);});};});
  document.querySelectorAll('[data-ss-del]').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-ss-del');confirmModal('Вы действительно хотите удалить это занятие?','Да, удалить','red',function(){del('sessions',id);});};});
  // инструкторы
  var ia=document.getElementById('inst-add'); if(ia)ia.onclick=function(){
    var n=val('inst-name'); if(!n)return;
    var f=document.getElementById('inst-photo').files[0];
    fileToDataUrl(f,400,function(url){save('instructors',{name:n,experience:val('inst-exp'),photo_url:url,active:1});});};
  document.querySelectorAll('[data-inst-toggle]').forEach(function(b){b.onclick=function(){save('instructors',{id:+b.getAttribute('data-inst-toggle'),active:+b.getAttribute('data-active')});};});
  document.querySelectorAll('[data-inst-photo]').forEach(function(inp){inp.onchange=function(){
    var f=inp.files[0]; if(!f)return;
    fileToDataUrl(f,400,function(url){if(url)save('instructors',{id:+inp.getAttribute('data-inst-photo'),photo_url:url});});};});
}
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}

// автологин если ключ есть
if(KEY){api('/api/admin/data').then(function(d){DATA=d;showApp();render();}).catch(function(){});}
